<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>スペルモード</title>
  <style>
    /* リセット */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f2f2f2;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      justify-content: flex-start;
      align-items: flex-start;
    }

    /* 全体ラッパー（上に15mm、左右5mmの余白を確保） */
    .screen {
      width: 100%;
      max-width: 540px;
      margin: 15mm 5mm 0; /* 上 15mm、左右 5mm */
      padding: 0;
    }

    /* 固定の上部ボタン（戻る・リセット） */
    .close-btn, .reset-btn {
      position: fixed;
      top: 15px;
      font-size: 2.2rem;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      z-index: 1200;
      background: transparent;
      border: none;
    }
    .close-btn { left: 15px; }
    .reset-btn { right: 15px; }

    /* 問題カード */
    .card {
      width: 100%;
      max-width: 500px;
      min-height: 35vh;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      padding: 18px;
      margin: 0 auto;
      font-size: 13px; /* ベースフォント */
      line-height: 1.6;
      display: block;
      overflow: visible;
      position: relative;
    }

    /* 問題テキスト（左詰め） 見た目で約10pt相当 */
    #spell-question {
      text-align: left;
      font-size: 13px; /* 見た目で約10pt */
      color: #111;
      margin-bottom: 18px;
      word-break: break-word;
    }

    /* カウンター（1/9）: 縦位置はそのまま、横は中央に大きく */
    #spell-progress {
      text-align: center;
      font-size: 1.25rem; /* 大きめ */
      color: #444;
      margin: 8px 0;
      width: 100%;
    }

    /* 入力欄（幅を1.2倍相当に、上下パディング2倍、中央配置） */
    #spell-input {
      display: block;
      width: calc(100% * 1.2);      /* 見た目で約1.2倍 */
      max-width: none;
      margin: 0 auto;               /* 中央寄せ */
      transform: translateX(-10%);  /* 幅を増やした分を中央に寄せる */
      padding: 20px 18px;           /* 上下を広め（2倍相当） */
      font-size: 1.05rem;
      border-radius: 10px;
      border: 1px solid #ccc;
      outline: none;
      box-shadow: none;
      background: #fff;
      box-sizing: border-box;
    }

    /* 決定ボタン（必要なら使用） */
    .answer-btn {
      display: block;
      width: 60%;
      max-width: 320px;
      margin: 18px auto 0;
      background: #2196F3;
      color: #fff;
      padding: 12px 16px;
      border-radius: 10px;
      text-align: center;
      font-size: 1.1rem;
      cursor: pointer;
      border: none;
    }

    /* 正解マーク（〇） */
    #spell-correct-mark {
      text-align: center;
      color: #2e7d32; /* 緑 */
      font-weight: 900;
      font-size: 4.0rem; /* 大きめ（2倍相当） */
      line-height: 1;
      margin-top: 12px;
      height: 1em;
      user-select: none;
    }

    /* 誤答オーバーレイ（中央に大きな青い × と正答表示） */
    .spell-overlay {
      position: fixed;
      left: 0;
      top: 0;
      width: 100vw;
      height: 100vh;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      background: rgba(0,0,0,0.35);
      padding: 20px;
    }
    .spell-overlay.visible { display: flex; }

    .spell-overlay .wrong-box {
      background: #fff;
      border-radius: 12px;
      padding: 18px;
      min-width: 60%;
      max-width: 90%;
      text-align: center;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    }

    .spell-overlay .wrong-x {
      color: #1976d2; /* 青 */
      font-weight: 900;
      font-size: 5.0rem; /* 大きな ×（2倍相当） */
      line-height: 1;
      margin-bottom: 12px;
      user-select: none;
    }

    .spell-overlay .correct-answer {
      color: #111;
      font-size: 1.2rem; /* 正答は12pt相当 */
      word-break: break-word;
    }

    /* 小画面調整 */
    @media (max-width: 480px) {
      .screen { margin: 15mm 5mm 0; }
      .card { padding: 16px; font-size: 13px; min-height: 40vh; }
      #spell-input { width: calc(100% * 1.15); transform: translateX(-7.5%); padding: 18px 14px; }
      #spell-correct-mark { font-size: 3.6rem; }
      .spell-overlay .wrong-x { font-size: 4.2rem; }
    }

    /* hidden ユーティリティ */
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- 上部ボタン -->
  <button id="spell-exit" class="close-btn" aria-label="戻る">×</button>
  <button id="spell-reset" class="reset-btn" aria-label="リセット">↺</button>

  <div id="spell" class="screen">

    <div class="card" id="card-area">
      <!-- 問題文 -->
      <div id="spell-question" class="spell-question">読み込み中…</div>

      <!-- 進捗（中央に大きく） -->
      <div id="spell-progress" class="spell-progress">0 / 0</div>

      <!-- 入力欄 -->
      <input id="spell-input" class="spell-input" type="text" autocomplete="off" />

      <!-- 正解マーク（〇） -->
      <div id="spell-correct-mark" aria-hidden="true"></div>
    </div>

  </div>

  <!-- 誤答オーバーレイ（タップで次へ） -->
  <div id="spell-wrong-overlay" class="spell-overlay" role="dialog" aria-modal="true">
    <div class="wrong-box" id="wrong-box">
      <div class="wrong-x" id="wrong-x">×</div>
      <div class="correct-answer" id="overlay-correct-answer"></div>
      <div style="font-size:0.85rem;color:#666;margin-top:8px;">画面をタップして次へ</div>
    </div>
  </div>

<script>
/* ===== データ取得 ===== */
let words = JSON.parse(localStorage.getItem("data") || "[]");

/* ===== 状態 ===== */
let currentIndex = 0;
let wrongList = [];
let reviewMode = false;
let reviewIndex = 0;

/* ===== 要素 ===== */
const spellQuestion = document.getElementById("spell-question");
const spellProgress = document.getElementById("spell-progress");
const spellInput = document.getElementById("spell-input");
const correctMark = document.getElementById("spell-correct-mark");

const overlay = document.getElementById("spell-wrong-overlay");
const overlayCorrectAnswer = document.getElementById("overlay-correct-answer");
const wrongX = document.getElementById("wrong-x");

const exitBtn = document.getElementById("spell-exit");
const resetBtn = document.getElementById("spell-reset");
const cardArea = document.getElementById("card-area");

/* ===== 初期化 ===== */
document.addEventListener("DOMContentLoaded", () => {
  if (!Array.isArray(words)) words = [];
  // 初期化: wrongList が保存されている場合は読み込まない（セッション内で管理）
  updateProgress();
  showQuestion();
});

/* ===== 閉じる / リセット ===== */
exitBtn.onclick = () => location.href = "mode-select.html";
resetBtn.onclick = () => {
  if (!confirm("復習リストをリセットしますか？")) return;
  localStorage.removeItem("excludedWords");
  alert("リセットしました");
};

/* ===== 進捗表示 ===== */
function updateProgress() {
  if (reviewMode) {
    const total = Math.max(1, wrongList.length);
    spellProgress.textContent = `${Math.min(reviewIndex + 1, total)} / ${total}`;
  } else {
    const total = Math.max(1, words.length);
    spellProgress.textContent = `${Math.min(currentIndex + 1, total)} / ${total}`;
  }
}

/* ===== 問題表示 ===== */
function showQuestion() {
  const item = reviewMode ? wrongList[reviewIndex] : words[currentIndex];
  if (!item) {
    spellQuestion.textContent = "問題がありません";
    spellInput.value = "";
    updateProgress();
    return;
  }
  spellQuestion.textContent = item.question;
  spellInput.value = "";
  spellInput.focus();
  correctMark.textContent = "";
  hideOverlay();
  updateProgress();
}

/* ===== 重複を避けて wrongList に追加 ===== */
function addToWrongList(item) {
  if (!item) return;
  const key = (item.question || "") + "||" + (item.answer || "");
  if (!wrongList.some(w => ((w.question || "") + "||" + (w.answer || "")) === key)) {
    wrongList.push(item);
  }
}

/* ===== 判定 ===== */
spellInput.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    checkAnswer();
  }
});

function checkAnswer() {
  const item = reviewMode ? wrongList[reviewIndex] : words[currentIndex];
  if (!item) return;

  const user = (spellInput.value || "").trim();
  const correct = (item.answer || "").trim();

  if (user === correct) {
    // 正解：大きな〇を表示して短時間で次へ
    correctMark.textContent = "〇";
    correctMark.style.color = "#2e7d32";
    // タップでも Enter でも次へ進めるようにする
    // 0.6秒後に自動で次へ
    setTimeout(() => {
      if (correctMark.textContent === "〇") correctMark.textContent = "";
      nextQuestion();
    }, 600);
  } else {
    // 不正解：重複を避けて wrongList に追加
    addToWrongList(item);

    // オーバーレイに正答を表示して、タップで次へ
    overlayCorrectAnswer.textContent = correct;
    showOverlay();
  }
}

/* ===== オーバーレイ表示 / 非表示 ===== */
function showOverlay() {
  overlay.classList.add("visible");
  // overlay をタップしたら次へ（1回だけ）
  overlay.onclick = () => {
    hideOverlay();
    nextQuestion();
  };
}

function hideOverlay() {
  overlay.classList.remove("visible");
  overlay.onclick = null;
}

/* ===== 次の問題へ ===== */
function nextQuestion() {
  // 正解マークをクリア
  correctMark.textContent = "";

  if (reviewMode) {
    reviewIndex++;
    if (reviewIndex >= wrongList.length) {
      finishReview();
      return;
    }
    showQuestion();
    return;
  }

  currentIndex++;
  if (currentIndex >= words.length) {
    finishSpell();
    return;
  }
  showQuestion();
}

/* ===== 終了処理 ===== */
function finishSpell() {
  // 結果画面を簡易表示（必要なら詳細実装）
  alert(`終了: 正答 ${words.length - wrongList.length} / ${words.length}`);
  // 必要ならここで結果画面へ遷移
}

/* ===== 復習終了 ===== */
function finishReview() {
  alert("復習完了");
  // 必要なら画面遷移
}

/* ===== カード領域のタップで次へ（正解時） ===== */
cardArea.addEventListener('click', (e) => {
  // オーバーレイが表示されている場合は overlay 側で処理するのでここでは無視
  if (overlay.classList.contains('visible')) return;
  // 正解マークが出ているときは次へ
  if (correctMark.textContent === "〇") {
    correctMark.textContent = "";
    nextQuestion();
  }
});

/* ===== 初期データが空の場合のダミー（開発用） ===== */
/* 実際は localStorage の data を使う想定 */
if (!Array.isArray(words) || words.length === 0) {
  words = [
    { question: "光合成とは何か", answer: "光合成" },
    { question: "植物の色素は何か", answer: "葉緑素" },
    { question: "水の化学式は", answer: "H2O" }
  ];
  updateProgress();
  showQuestion();
}
</script>
</body>
</html>
