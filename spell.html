<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>スペルモード</title>
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{height:100%;margin:0;padding:0}
  body{font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",Segoe UI,Roboto,Arial;background:#f2f2f2;color:#111}
  .screen{width:100%;max-width:640px;margin:15mm 5mm 20px;padding:0 8px}
  .top-btn{position:fixed;top:12px;z-index:1200;background:transparent;border:none;font-size:1.6rem;font-weight:700;cursor:pointer}
  #btn-exit{left:12px} #btn-reset{right:12px}
  .question-area{background:#fff;border-radius:12px;padding:18px;min-height:22vh;display:flex;flex-direction:column;gap:12px}
  #spell-question{font-size:16px;line-height:1.7;word-break:break-word}
  #spell-progress{text-align:center;font-size:1.25rem;color:#444}
  #spell-correct-mark{text-align:center;color:#c62828;font-weight:900;font-size:3.6rem;height:1em}
  .input-wrap{width:100%;max-width:640px;margin:6px auto 0;padding:0 18px}
  #spell-input{width:100%;padding:18px 14px;font-size:1.05rem;border-radius:10px;border:1px solid #ccc}
  .controls{display:flex;justify-content:center;gap:12px;margin-top:12px}
  .btn{padding:10px 14px;border-radius:8px;border:none;cursor:pointer;font-size:1rem}
  .btn-primary{background:#1976d2;color:#fff}
  .btn-ghost{background:transparent;color:#1976d2;border:1px solid #cfe3ff}
  .overlay{position:fixed;left:0;top:0;width:100vw;height:100vh;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.36);z-index:2000;padding:20px}
  .overlay.visible{display:flex}
  .overlay-box{background:#fff;border-radius:12px;padding:18px;min-width:60%;max-width:92%;text-align:center}
  .overlay-x{color:#1565c0;font-weight:900;font-size:5.0rem;margin-bottom:12px}
  .overlay-answer{color:#111;font-size:1.15rem;word-break:break-word}
  .result{width:100%;max-width:720px;margin:18px auto;background:#fff;border-radius:12px;padding:18px;text-align:center}
</style>
</head>
<body>
  <button id="btn-exit" class="top-btn" aria-label="戻る">×</button>
  <button id="btn-reset" class="top-btn" aria-label="リセット">↺</button>

  <main class="screen" id="main-screen">
    <section class="question-area" id="question-area">
      <div id="spell-question">読み込み中…</div>
      <div id="spell-progress">0 / 0</div>
      <div id="spell-correct-mark" aria-hidden="true"></div>
    </section>

    <div class="input-wrap">
      <input id="spell-input" type="text" autocomplete="off" inputmode="text" placeholder="ここに入力して Enter" />
    </div>

    <div class="controls" aria-hidden="true">
      <button id="btn-check" class="btn btn-primary">判定</button>
      <button id="btn-skip" class="btn btn-ghost">スキップ</button>
    </div>

    <div id="result-area" class="result" style="display:none"></div>
  </main>

  <div id="overlay" class="overlay" role="dialog" aria-modal="true">
    <div class="overlay-box" id="overlay-box">
      <div class="overlay-x">×</div>
      <div class="overlay-answer" id="overlay-answer"></div>
      <div style="font-size:0.85rem;color:#666;margin-top:10px">画面をタップして次へ</div>
    </div>
  </div>

<script>
/* ユーティリティ */
function getParam(name){ return new URLSearchParams(location.search).get(name); }
function getAllUrls(){ const p = new URLSearchParams(location.search); const urls=[]; // url, url1..url9 を許容
  const primary = p.get('url'); if(primary) urls.push(primary);
  for(let i=1;i<=9;i++){ const u = p.get('url'+i); if(u) urls.push(u); }
  return urls;
}
function materialIdFromUrls(urls){ try{ return btoa(unescape(encodeURIComponent(urls.join('|')))).replace(/=+$/,''); }catch(e){ return encodeURIComponent(urls.join('|')).replace(/[^a-zA-Z0-9]/g,'_'); } }
function splitCSVLine(line){ const res=[]; let cur="", inQuotes=false; for(let i=0;i<line.length;i++){ const ch=line[i]; if(ch==='"'){ if(inQuotes && line[i+1]==='"'){ cur+='"'; i++; continue; } inQuotes=!inQuotes; continue; } if(ch===',' && !inQuotes){ res.push(cur); cur=""; continue; } cur+=ch; } res.push(cur); return res.map(s=>s.trim()); }
function parseCSV(text){ text=text.replace(/\r\n/g,"\n").replace(/\r/g,"\n"); const lines=text.split("\n").filter(l=>l.trim()!==""); if(!lines.length) return []; const header=splitCSVLine(lines[0]); const rows=[]; for(let i=1;i<lines.length;i++){ const cols=splitCSVLine(lines[i]); const obj={}; for(let j=0;j<header.length;j++) obj[header[j]||`col${j}`]=cols[j]||""; rows.push(obj); } return rows; }

/* DOM */
const spellQuestion = document.getElementById('spell-question');
const spellProgress = document.getElementById('spell-progress');
const spellInput = document.getElementById('spell-input');
const correctMark = document.getElementById('spell-correct-mark');
const overlay = document.getElementById('overlay');
const overlayAnswer = document.getElementById('overlay-answer');
const btnExit = document.getElementById('btn-exit');
const btnReset = document.getElementById('btn-reset');
const btnCheck = document.getElementById('btn-check');
const btnSkip = document.getElementById('btn-skip');
const resultArea = document.getElementById('result-area');

/* 状態 */
let items = []; // {word, spelling, raw}
let idx = 0;
let materialUrls = getAllUrls();
let materialId = materialIdFromUrls(materialUrls);
let wrongList = [];
let excluded = [];
let reviewMode = false;
let reviewIndex = 0;

/* ストレージキー */
function progressKey(){ return `progress_${materialId}_spell`; }
function wrongKey(){ return `wrong_${materialId}_spell`; }
function excludedKey(){ return `excluded_${materialId}_spell`; }

/* 保存/復元 */
function saveProgress(){ try{ localStorage.setItem(progressKey(), JSON.stringify({index: idx, updatedAt: Date.now()})); }catch(e){} }
function loadProgress(){ try{ const raw = JSON.parse(localStorage.getItem(progressKey()||"null")||"null"); if(raw && typeof raw.index==='number') idx = Math.min(Math.max(0, raw.index), Math.max(0, items.length-1)); else idx = 0; }catch(e){ idx = 0; } }
function saveWrong(){ try{ localStorage.setItem(wrongKey(), JSON.stringify(wrongList)); }catch(e){} }
function loadWrong(){ try{ const raw = JSON.parse(localStorage.getItem(wrongKey()||"[]")||"[]"); if(Array.isArray(raw)) wrongList = raw; else wrongList = []; }catch(e){ wrongList = []; } }
function saveExcluded(){ try{ localStorage.setItem(excludedKey(), JSON.stringify(excluded)); }catch(e){} }
function loadExcluded(){ try{ const raw = JSON.parse(localStorage.getItem(excludedKey()||"[]")||"[]"); if(Array.isArray(raw)) excluded = raw; else excluded = []; }catch(e){ excluded = []; } }

/* データ読み込み（複数分割を結合） */
async function fetchAndCombine(urls){
  const combined = [];
  for(const u of urls){
    try{
      const res = await fetch(u, { cache: "no-store" });
      if(!res.ok) throw new Error(res.status);
      const text = await res.text();
      const parsed = parseCSV(text);
      combined.push(...parsed);
    }catch(err){
      console.warn('fetch error', u, err);
    }
  }
  return combined;
}

/* 整形 */
function normalizeItems(parsedRows){
  return parsedRows.map(row => {
    const keys = Object.keys(row);
    const wKey = keys.find(k=>/word|term|単語|語/i.test(k)) || keys[0];
    const sKey = keys.find(k=>/spelling|spell|綴り|答/i.test(k)) || keys.find(k=>/answer|ans|答/i.test(k)) || keys[1] || keys[0];
    return { word: row[wKey]||row[keys[0]]||"", spelling: row[sKey]||row[keys[1]]||"", raw: row };
  });
}

/* 初期化 */
async function loadAndStart(){
  if(!materialUrls.length){ spellQuestion.textContent = '教材が指定されていません'; return; }
  try{
    const parsedRows = await fetchAndCombine(materialUrls);
    items = normalizeItems(parsedRows);
    loadExcluded();
    if(Array.isArray(excluded) && excluded.length) items = items.filter(it => !excluded.includes(it.word || it.raw[Object.keys(it.raw)[0]] || ""));
    loadWrong();
    loadProgress();
    renderQuestion();
  }catch(err){
    spellQuestion.textContent = 'CSV の読み込みに失敗しました: ' + err.message;
    spellProgress.textContent = '';
  }
}

/* レンダリング */
function safeItem(list, i){ if(!Array.isArray(list)||list.length===0) return null; if(i<0) i=0; if(i>=list.length) i=list.length-1; return list[i]; }
function renderQuestion(){
  const item = reviewMode ? safeItem(wrongList, reviewIndex) : safeItem(items, idx);
  if(!item){ spellQuestion.textContent = '問題がありません'; spellInput.value=''; correctMark.textContent=''; updateProgress(); return; }
  spellQuestion.textContent = item.word || item.raw[Object.keys(item.raw)[0]] || '';
  spellInput.value = ''; correctMark.textContent=''; hideOverlay();
  setTimeout(()=>{ spellInput.scrollIntoView({behavior:'smooth', block:'center'}); }, 120);
  updateProgress();
}
function updateProgress(){
  if(reviewMode){ const total = Math.max(1, wrongList.length); spellProgress.textContent = `${Math.min(reviewIndex+1,total)} / ${total}`; }
  else { const total = Math.max(1, items.length); spellProgress.textContent = `${Math.min(idx+1,total)} / ${total}`; }
}

/* 判定 */
function normalize(s){ return String(s||'').trim().toLowerCase(); }
function addToWrongList(item){ if(!item) return; const key = (item.word||'') + '||' + (item.spelling||''); if(!wrongList.some(w=>((w.word||'')+'||'+(w.spelling||''))===key)){ wrongList.push(item); saveWrong(); } }
function checkAnswer(){
  const item = reviewMode ? safeItem(wrongList, reviewIndex) : safeItem(items, idx);
  if(!item) return;
  const user = (spellInput.value||'').trim();
  const correct = (item.spelling||'').trim();
  if(user !== '' && normalize(user) === normalize(correct)){
    correctMark.textContent = '✓';
    setTimeout(()=>{ if(correctMark.textContent==='✓') correctMark.textContent=''; proceedNextAfterAnswer(true); }, 600);
  } else {
    addToWrongList(item);
    overlayAnswer.textContent = correct || '(正答なし)';
    showOverlay();
  }
}
function proceedNextAfterAnswer(wasCorrect){
  if(reviewMode){
    reviewIndex++;
    if(reviewIndex >= wrongList.length){ finishReview(); return; }
    renderQuestion(); return;
  }
  idx++;
  if(idx >= items.length){ finishSpell(); return; }
  renderQuestion();
  saveProgress();
}

/* オーバーレイ */
function showOverlay(){ overlay.classList.add('visible'); overlay.style.display='flex'; overlay.onclick = ()=>{ hideOverlay(); proceedNextAfterAnswer(false); }; }
function hideOverlay(){ overlay.classList.remove('visible'); overlay.style.display='none'; overlay.onclick = null; }

/* 終了処理 */
function finishSpell(){
  const total = items.length; const wrong = wrongList.length; const correctCount = Math.max(0, total - wrong);
  resultArea.style.display = 'block';
  resultArea.innerHTML = `<div style="font-size:1.15rem;font-weight:700;margin-bottom:10px">終了</div><div style="font-size:1rem;margin-bottom:12px">${correctCount} / ${total} 正解</div>${ wrong>0 ? '<button id="btn-review" class="btn btn-primary">復習する</button>' : '<button id="btn-back" class="btn btn-primary">モード選択へ</button>' }`;
  spellInput.disabled = true;
  if(wrong>0){ document.getElementById('btn-review').onclick = ()=>{ reviewMode=true; reviewIndex=0; resultArea.style.display='none'; spellInput.disabled=false; renderQuestion(); }; }
  else { document.getElementById('btn-back').onclick = ()=> goBackToIndex(); }
}
function finishReview(){ resultArea.style.display='block'; resultArea.innerHTML = `<div style="font-size:1.15rem;font-weight:700;margin-bottom:10px">復習完了</div><button id="btn-back2" class="btn btn-primary">モード選択へ</button>`; document.getElementById('btn-back2').onclick = ()=> goBackToIndex(); }

/* 操作 */
btnCheck.addEventListener('click', checkAnswer);
btnSkip.addEventListener('click', ()=> { proceedNextAfterAnswer(false); });
spellInput.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); checkAnswer(); } });
document.querySelector('.overlay')?.addEventListener('click', ()=>{ overlay.classList.remove('visible'); });
document.getElementById('btn-exit').addEventListener('click', ()=> goBackToIndex());
document.getElementById('btn-reset').addEventListener('click', ()=> { if(!confirm('復習リストと進捗をリセットしますか？')) return; localStorage.removeItem(progressKey()); localStorage.removeItem(wrongKey()); localStorage.removeItem(excludedKey()); wrongList=[]; excluded=[]; idx=0; reviewMode=false; reviewIndex=0; resultArea.style.display='none'; spellInput.disabled=false; loadAndStart(); alert('リセットしました'); });

/* 戻る（index に resumeIndex を付けて戻す） */
const startIndex = Number(getParam('startIndex') || -1);
function goBackToIndex(){
  const nextIdx = (Number.isFinite(startIndex) && startIndex >= 0) ? startIndex + 1 : null;
  if(nextIdx !== null) location.href = `index.html?resumeIndex=${nextIdx}`;
  else location.href = 'index.html';
}

/* 初期化 */
async function loadAndStart(){
  if(!materialUrls.length){ spellQuestion.textContent = '教材が指定されていません'; return; }
  const parsedRows = await (async ()=>{ try{ return await fetchAndCombine(materialUrls); }catch(e){ return []; } })();
  items = normalizeItems(parsedRows);
  loadExcluded();
  if(Array.isArray(excluded) && excluded.length) items = items.filter(it => !excluded.includes(it.word || it.raw[Object.keys(it.raw)[0]] || ""));
  loadWrong();
  loadProgress();
  renderQuestion();
}

/* fetchAndCombine と normalizeItems を上で定義済み */
async function fetchAndCombine(urls){
  const combined=[]; for(const u of urls){ try{ const res = await fetch(u, { cache: "no-store" }); if(!res.ok) throw new Error(res.status); const text = await res.text(); combined.push(...parseCSV(text)); }catch(e){ console.warn('fetch error', u, e); } } return combined;
}
function normalizeItems(parsedRows){ return parsedRows.map(row=>{ const keys=Object.keys(row); const wKey = keys.find(k=>/word|term|単語|語/i.test(k))||keys[0]; const sKey = keys.find(k=>/spelling|spell|綴り|答/i.test(k))||keys.find(k=>/answer|ans|答/i.test(k))||keys[1]||keys[0]; return { word: row[wKey]||'', spelling: row[sKey]||'', raw: row }; }); }

/* 離脱時の保険 */
window.addEventListener('beforeunload', ()=>{ saveProgress(); saveWrong(); saveExcluded(); });

/* DOMContentLoaded */
document.addEventListener('DOMContentLoaded', ()=>{ loadAndStart(); });
</script>
</body>
</html>
