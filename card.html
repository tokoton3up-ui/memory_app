<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>カードモード</title>
  <style>

/* 全体レイアウト */
body {
  font-family: sans-serif;
  margin: 0;
  padding: 0;
  background: #f2f2f2;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.screen {
  width: 100%;
  margin: 0;
  padding: 0;
  display: block;
}

/* カード全体を包む */
.card-wrapper {
  width: 100vw;          /* スマホ画面幅に合わせる */
  max-width: 500px;      /* タブレットやPCでは広がりすぎないように制限 */
  margin: 0 auto;        /* 中央寄せ */
  padding: 0 10px;       /* 画面端にくっつかないように少し余白 */
  box-sizing: border-box;
}



/* × と ↺ をカード幅に合わせて配置 */
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}

.back-button,
.reset-btn {
  font-size: 2rem;
  font-weight: 700;
  cursor: pointer;
  user-select: none;
}

/* カード本体 */
.card {
  width: 100%;
  min-height: 40vh;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);

  display: flex;               /* ← これがないと中央にならない */
  flex-direction: column;
  justify-content: center;     /* ← 文字を上下中央にする */
  align-items: flex-start;     /* ← 左揃えのまま */

  padding: 20px 12px;
  font-size: 7vw;
  line-height: 1.6;

  text-align: left;
  overflow-y: auto;
  box-sizing: border-box;
}


/* 進捗（1/9） */
.progress {
  margin-top: 10px;
  font-size: 1.1rem;
  text-align: center;
  color: #555;
}

/* 矢印エリア */
.arrow-area {
  width: 90%;
  max-width: 500px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 15px;
}

/* ▶ ◀ に変更（大きめ） */
.arrow {
  font-size: 2.6rem;
  font-weight: 800;
  padding: 10px 20px;
  cursor: pointer;
  user-select: none;
}

/* 覚えたボタン（中央） */
.learned-btn {
  background: #4CAF50;
  color: white;
  padding: 14px 20px;
  border-radius: 10px;
  font-size: 1.3rem;
  border: none;
  cursor: pointer;
  user-select: none;
  margin: 0 auto;
  display: block;
  margin-top: 20px;
}


/* スマホ向け微調整 */
@media (max-width: 480px) {

  .card {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    font-size: 7vw;
    padding: 20px 12px;
    height: 55vh;
    box-sizing: border-box;
  }

  .card-wrapper {
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
    padding: 0 10px;
    box-sizing: border-box;
  }

  .arrow-area {
    width: 100%;
    max-width: 500px;
    margin: 10px auto 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
}





  </style>
</head>

<body>

 <div class="screen">

    <div class="card-wrapper">

  <div class="card-header">
    <div class="back-button" onclick="location.href='mode-select.html'">×</div>
    <div class="reset-btn" onclick="resetExcluded()">↺</div>
  </div>

  <div id="card" class="card" onclick="flipCard()"></div>

  <!-- 進捗表示 -->
  <div id="progress" class="progress"></div>

  <!-- 覚えたボタン -->
  <button id="btn-learned" class="learned-btn">覚えた</button>

  <!-- 進む・戻る（カードの真下に来る） -->
  <div class="arrow-area">
    <div class="arrow" onclick="prevCard()">◀</div>
    <div class="arrow" onclick="nextCard()">▶</div>
  </div>

</div>


<script>
  /* index.html で読み込んだ CSV データを取得 */
  let words = JSON.parse(localStorage.getItem("data") || "[]");

  let index = 0;
  let showingFront = true;

  /* 除外リスト */
  let excluded = JSON.parse(localStorage.getItem("excludedWords") || "[]");

  const cardEl = document.getElementById("card");
  const progressEl = document.getElementById("progress");

  /* ★ カード更新 */
  function updateCard() {
    if (words.length === 0) {
      cardEl.textContent = "すべて覚えました！";
      progressEl.textContent = "";
      return;
    }

    const item = words[index];
    cardEl.textContent = showingFront ? item.question : item.answer;

   if (showingFront) {
  //cardEl.style.textAlign = "left";   // 問題側：左寄せ
   // cardEl.style.fontSize = "10pt";
} else {
  //cardEl.style.textAlign = "center"; // 答え側：中央寄せ
  // cardEl.style.fontSize = "12pt";
}

 /* ★ 12/30 のような表示 */
  progressEl.textContent = `${index + 1} / ${words.length}`;
}

  function flipCard() {
    showingFront = !showingFront;
    updateCard();
  }

  function nextCard() {
    if (index < words.length - 1) {
      index++;
      showingFront = true;
      updateCard();
    }
  }

  function prevCard() {
    if (index > 0) {
      index--;
      showingFront = true;
      updateCard();
    }
  }

  /* ★ 覚えた（除外） */
  document.getElementById("btn-learned").onclick = () => {
    const item = words[index];

    excluded.push(item.question);
    localStorage.setItem("excludedWords", JSON.stringify(excluded));

    words.splice(index, 1);

    if (index >= words.length) index = words.length - 1;
    showingFront = true;
    updateCard();
  };

  /* ★ 除外リセット（↺） */
  function resetExcluded() {
  if (!confirm("除外リストをリセットしますか？")) return;

  localStorage.removeItem("excludedWords");
  excluded = [];

  // ★ 除外リストを反映して words を再構築
  words = originalWords.filter(item => !excluded.includes(item.question));

  // ★ 表示を更新
  updateCard();
  updateProgress();

  alert("除外リストをリセットしました");
}


  document.addEventListener("DOMContentLoaded", () => {
    /* 除外済みを除いたリストを作成 */
    words = words.filter(item => !excluded.includes(item.question));
    updateCard();
  });
</script>

</body>
</html>
