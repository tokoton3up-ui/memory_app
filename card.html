<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>カードモード</title>
  <style>
    /* リセットと基本 */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f2f2f2;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .screen {
      width: 100%;
      margin: 0;
      padding: 0;
      display: block;
    }

    /* カード全体を包む */
    .card-wrapper {
      width: 100%;
      max-width: 500px;
      margin: 18px auto;
      padding: 0 12px; /* 両端に数ミリの余白 */
      box-sizing: border-box;
    }

    /* ヘッダー（× と ↺） */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .back-button,
    .reset-btn {
      font-size: 1.8rem;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      line-height: 1;
      padding: 6px 8px;
    }

    /* カード本体（共通） */
    .card {
      width: 100%;
      min-height: 48vh;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      justify-content: center; /* 上下中央 */
      box-sizing: border-box;
      padding: 20px 14px;
      line-height: 1.6;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      transition: all 160ms ease;
      word-break: break-word;
    }

    /* 表面（問題側） */
    .card.front {
      align-items: flex-start;   /* 左揃え */
      text-align: left;
      font-size: 12px;           /* 見た目で約9pt相当 */
    }

    /* 裏面（答え側） */
    .card.back {
      align-items: center;       /* 左右中央 */
      text-align: center;
      font-size: 16px;           /* 見た目で約12pt相当 */
    }

    /* 進捗（中央表示） */
    .progress {
      font-size: 1.05rem;
      color: #555;
      text-align: center;
      min-width: 56px;
    }

    /* コントロール全体（覚えたボタン＋矢印＋進捗） */
    .controls {
      width: 100%;
      max-width: 500px;
      margin: 12px auto 0;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
    }

    /* 覚えたボタンは中央 */
    .learned-btn {
      background: #4CAF50;
      color: white;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 1.05rem;
      border: none;
      cursor: pointer;
      user-select: none;
      width: 100%;
      max-width: 320px;
    }

    /* 矢印エリアを中央に配置、進捗を中央に */
    .arrow-area {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 28px;
    }

    /* 矢印 */
    .arrow {
      font-size: 2.0rem;
      font-weight: 800;
      padding: 6px 12px;
      cursor: pointer;
      user-select: none;
      background: transparent;
      border-radius: 8px;
      line-height: 1;
    }
    .arrow:active { transform: translateY(1px); }

    /* 小さい画面向け微調整 */
    @media (max-width: 480px) {
      .card {
        min-height: 50vh;
        padding: 18px 12px;
      }
      .card.front { font-size: 16px; }
      .card.back  { font-size: 18px; }
      .arrow { font-size: 1.8rem; }
      .learned-btn { padding: 12px 16px; font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="card-wrapper">

      <div class="card-header">
        <div class="back-button" onclick="location.href='mode-select.html'">×</div>
        <div class="reset-btn" onclick="resetExcluded()">↺</div>
      </div>

      <!-- カード本体。初期は front クラス -->
      <div id="card" class="card front" onclick="flipCard()"></div>

      <!-- コントロール（覚えたボタン、矢印、進捗） -->
      <div class="controls">
        <button id="btn-learned" class="learned-btn">覚えた</button>

        <div class="arrow-area">
          <div class="arrow" onclick="prevCard()">◀</div>
          <div id="progress" class="progress">0 / 0</div>
          <div class="arrow" onclick="nextCard()">▶</div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // --- 変更点の要点 ---
    // ・index.html / mode-select.html と連携するため、現在教材情報を CURRENT_MATERIAL_KEY から取得する
    // ・教材ごとにデータと進捗を保存する（DATA_PREFIX / PROGRESS_PREFIX）
    // ・既存の "data" / "excludedWords" の互換性も保つ（古い動作を壊さない）
    // ・UI は基本的に変更しない

    const CURRENT_MATERIAL_KEY = "current_material";
    const DATA_PREFIX = "material_data_";
    const PROGRESS_PREFIX = "progress_";

    // 既存のコードで使っていたキー（互換）
    const LEGACY_DATA_KEY = "data";
    const LEGACY_EXCLUDED_KEY = "excludedWords";
    const LEGACY_ORIGINAL_KEY = "originalData";

    // 状態
    let words = [];           // 現在表示する配列（除外済みを除いたもの）
    let originalWords = [];   // 元データ（除外前）
    let index = 0;
    let showingFront = true;
    let excluded = [];        // 除外リスト（質問テキストで管理）

    // 現在の教材情報（存在しない場合は null）
    let currentMaterial = null;
    let currentId = null;

    const cardEl = document.getElementById("card");
    const progressEl = document.getElementById("progress");
    const learnedBtn = document.getElementById("btn-learned");

    /* ---------- 進捗保存 / 読み込み ---------- */
    function saveProgress() {
      if (!currentId) {
        // 互換：レガシーキーで保存
        const legacy = { index, excluded };
        localStorage.setItem(PROGRESS_PREFIX + "legacy", JSON.stringify(legacy));
        return;
      }
      const payload = { index, excluded };
      localStorage.setItem(PROGRESS_PREFIX + currentId, JSON.stringify(payload));
    }

    function loadProgress() {
      if (!currentId) {
        // 互換：レガシーキーから読み込み
        try {
          const raw = localStorage.getItem(PROGRESS_PREFIX + "legacy");
          if (raw) {
            const p = JSON.parse(raw);
            index = Number(p.index || 0);
            excluded = Array.isArray(p.excluded) ? p.excluded.slice() : [];
          } else {
            index = 0;
            excluded = JSON.parse(localStorage.getItem(LEGACY_EXCLUDED_KEY) || "[]");
          }
        } catch (e) {
          index = 0;
          excluded = JSON.parse(localStorage.getItem(LEGACY_EXCLUDED_KEY) || "[]");
        }
        return;
      }
      try {
        const raw = localStorage.getItem(PROGRESS_PREFIX + currentId);
        if (raw) {
          const p = JSON.parse(raw);
          index = Number(p.index || 0);
          excluded = Array.isArray(p.excluded) ? p.excluded.slice() : [];
        } else {
          index = 0;
          excluded = [];
        }
      } catch (e) {
        index = 0;
        excluded = [];
      }
    }

    /* ---------- データ読み込み ---------- */
    function loadDataFromCurrentMaterial() {
      // currentMaterial は mode-select でセットされている想定
      try {
        currentMaterial = JSON.parse(localStorage.getItem(CURRENT_MATERIAL_KEY) || "null");
      } catch (e) {
        currentMaterial = null;
      }

      if (currentMaterial && currentMaterial.id) {
        currentId = currentMaterial.id;
        // まず、DATA_PREFIX + id を探す
        try {
          const raw = localStorage.getItem(DATA_PREFIX + currentId);
          if (raw) {
            originalWords = JSON.parse(raw);
          } else {
            // 互換：legacy data を探す
            originalWords = JSON.parse(localStorage.getItem(LEGACY_DATA_KEY) || "null") || [];
          }
        } catch (e) {
          originalWords = JSON.parse(localStorage.getItem(LEGACY_DATA_KEY) || "null") || [];
        }
      } else {
        // currentMaterial がない場合は従来の "data" を使う（互換）
        currentId = null;
        originalWords = JSON.parse(localStorage.getItem(LEGACY_DATA_KEY) || "null") || [];
      }

      // originalWords は配列の想定。もしオブジェクト配列で question/answer でない場合は自動変換はしない。
      // ここでは既存の card.html の期待に合わせるため、もしオブジェクトに question/answer が無ければ
      // ヘッダ推定（最初の2列を question/answer にする）などの処理は行わない。index.html 側で適切に整形して保存する想定。
    }

    /* ---------- ユーティリティ: 配列から除外を反映 ---------- */
    function applyExcluded() {
      if (!Array.isArray(originalWords)) originalWords = [];
      // excluded は question テキストで管理している既存コードに合わせる
      words = originalWords.filter(item => !excluded.includes(item.question));
      // index が範囲外なら調整
      if (index >= words.length) index = Math.max(0, words.length - 1);
      if (index < 0) index = 0;
    }

    /* ---------- UI 更新 ---------- */
    function updateCard() {
      if (!Array.isArray(words) || words.length === 0) {
        cardEl.textContent = "すべて覚えました！";
        progressEl.textContent = "";
        return;
      }

      // 範囲チェック
      if (index < 0) index = 0;
      if (index >= words.length) index = words.length - 1;

      const item = words[index];
      // 既存コードは item.question / item.answer を期待している
      cardEl.textContent = showingFront ? (item.question || "") : (item.answer || "");

      // クラスで表裏を切り替え（CSSで見た目を制御）
      if (showingFront) {
        cardEl.classList.remove('back');
        cardEl.classList.add('front');
      } else {
        cardEl.classList.remove('front');
        cardEl.classList.add('back');
      }

      // 進捗表示
      progressEl.textContent = `${index + 1} / ${words.length}`;

      // 保存（ユーザが途中でやめても続きから再開できるように）
      saveProgress();
    }

    /* ---------- 操作ハンドラ（既存の関数を維持） ---------- */
    function flipCard() {
      showingFront = !showingFront;
      updateCard();
    }

    function nextCard() {
      if (words.length === 0) return;
      if (index < words.length - 1) {
        index++;
        showingFront = true;
        updateCard();
      }
    }

    function prevCard() {
      if (words.length === 0) return;
      if (index > 0) {
        index--;
        showingFront = true;
        updateCard();
      }
    }

    // 覚えた（除外）
    learnedBtn.onclick = () => {
      if (words.length === 0) return;
      const item = words[index];
      // 既存コードは question をキーにしていたので合わせる
      excluded.push(item.question);
      // 保存（除外リストは進捗と一緒に保存）
      // words から削除
      words.splice(index, 1);
      // originalWords はそのまま保持（reset 時に復元）
      // index を調整
      if (index >= words.length) index = Math.max(0, words.length - 1);
      showingFront = true;
      saveProgress();
      updateCard();
      // 互換のため、従来キーも更新しておく
      localStorage.setItem(LEGACY_EXCLUDED_KEY, JSON.stringify(excluded));
    };

    // 除外リセット（↺）
    function resetExcluded() {
      if (!confirm("除外リストをリセットしますか？")) return;
      // 進捗キーを削除（教材ごと）
      if (currentId) {
        localStorage.removeItem(PROGRESS_PREFIX + currentId);
      } else {
        localStorage.removeItem(PROGRESS_PREFIX + "legacy");
      }
      // 互換キーも削除
      localStorage.removeItem(LEGACY_EXCLUDED_KEY);

      // originalWords があるなら復元
      if (Array.isArray(originalWords) && originalWords.length > 0) {
        excluded = [];
        words = originalWords.slice();
      } else {
        // fallback: legacy data
        const legacy = JSON.parse(localStorage.getItem(LEGACY_DATA_KEY) || "null");
        if (legacy && Array.isArray(legacy)) {
          excluded = [];
          words = legacy.slice();
        } else {
          excluded = [];
          words = [];
        }
      }
      index = 0;
      showingFront = true;
      updateCard();
      alert("除外リストをリセットしました");
    }

    /* ---------- 初期化 ---------- */
    document.addEventListener("DOMContentLoaded", () => {
      // 1) データ読み込み（mode-select/index と連携）
      loadDataFromCurrentMaterial();

      // 2) 進捗読み込み（教材ごと）
      loadProgress();

      // 3) 除外済みを反映して words を作る
      // 互換のため、もし excluded が空で legacy にあるならそれを使う
      if ((!excluded || !Array.isArray(excluded) || excluded.length === 0) && !currentId) {
        // 既存の挙動を保つ
        excluded = JSON.parse(localStorage.getItem(LEGACY_EXCLUDED_KEY) || "[]");
      }
      applyExcluded();

      // 4) originalData を保存しておく（既存コードが参照するキー）
      try {
        localStorage.setItem(LEGACY_ORIGINAL_KEY, JSON.stringify(originalWords));
      } catch (e) {
        // 無視
      }

      // 5) 初期表示
      updateCard();
    });

    // ページ離脱時にも保存（念のため）
    window.addEventListener("beforeunload", () => {
      saveProgress();
      // 互換キーも更新
      localStorage.setItem(LEGACY_EXCLUDED_KEY, JSON.stringify(excluded));
    });
  </script>
</body>
</html>
