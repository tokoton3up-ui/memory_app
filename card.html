<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>カードモード</title>
<style>
  *,*::before,*::after{box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",Segoe UI,Roboto,Arial,sans-serif;margin:0;background:#f2f2f2;min-height:100vh;display:flex;flex-direction:column;align-items:center}
  .card-wrapper{width:100%;max-width:500px;margin:18px auto;padding:0 12px}
  .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .back-button,.reset-btn{font-size:1.8rem;font-weight:700;cursor:pointer;padding:6px 8px}
  .card{width:100%;min-height:48vh;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.12);display:flex;flex-direction:column;justify-content:center;padding:20px 14px;overflow-y:auto}
  .card.front{align-items:flex-start;text-align:left;font-size:12px}
  .card.back{align-items:center;text-align:center;font-size:16px}
  .controls{width:100%;max-width:500px;margin:12px auto 0;display:flex;flex-direction:column;align-items:center;gap:10px;padding:0 12px}
  .learned-btn{background:#4CAF50;color:#fff;padding:12px 18px;border-radius:10px;border:0;cursor:pointer;width:100%;max-width:320px}
  .arrow-area{width:100%;display:flex;justify-content:center;align-items:center;gap:28px}
  .arrow{font-size:2rem;font-weight:800;cursor:pointer}
  .progress{font-size:1.05rem;color:#555;text-align:center;min-width:56px}
</style>
</head>
<body>
  <div class="card-wrapper">
    <div class="card-header">
      <div class="back-button" id="btn-back">×</div>
      <div class="reset-btn" id="btn-reset">↺</div>
    </div>
    <div id="card" class="card front" onclick="flipCard()">読み込み中…</div>
    <div class="controls">
      <button id="btn-learned" class="learned-btn">覚えた</button>
      <div class="arrow-area">
        <div class="arrow" id="prevBtn">◀</div>
        <div id="progress" class="progress">0 / 0</div>
        <div class="arrow" id="nextBtn">▶</div>
      </div>
    </div>
  </div>

<script>
/* ユーティリティ */
function getParam(name){ return new URLSearchParams(location.search).get(name); }
function materialIdFromUrl(url){ try{ return btoa(unescape(encodeURIComponent(url))).replace(/=+$/,""); }catch(e){ return encodeURIComponent(url).replace(/[^a-zA-Z0-9]/g,'_'); } }
function splitCSVLine(line){ const res=[]; let cur="", inQuotes=false; for(let i=0;i<line.length;i++){ const ch=line[i]; if(ch==='"'){ if(inQuotes && line[i+1]==='"'){ cur+='"'; i++; continue; } inQuotes=!inQuotes; continue; } if(ch===',' && !inQuotes){ res.push(cur); cur=""; continue; } cur+=ch; } res.push(cur); return res.map(s=>s.trim()); }
function parseCSV(text){ text=text.replace(/\r\n/g,"\n").replace(/\r/g,"\n"); const lines=text.split("\n").filter(l=>l.trim()!==""); if(!lines.length) return []; const header=splitCSVLine(lines[0]); const rows=[]; for(let i=1;i<lines.length;i++){ const cols=splitCSVLine(lines[i]); const obj={}; for(let j=0;j<header.length;j++) obj[header[j]||`col${j}`]=cols[j]||""; rows.push(obj); } return rows; }

/* 状態 */
const DATA_PREFIX = "material_data_";
const PROGRESS_PREFIX = "progress_";
const EXCLUDED_PREFIX = "excluded_";

let materialUrl = getParam('url');
let startIndex = Number(getParam('startIndex') || -1);
let materialId = materialIdFromUrl(materialUrl || "");
let original = [];
let words = [];
let index = 0;
let showingFront = true;
let excluded = [];

/* DOM */
const cardEl = document.getElementById('card');
const progressEl = document.getElementById('progress');
const btnLearned = document.getElementById('btn-learned');

/* 保存/復元 */
function progressKey(){ return `${PROGRESS_PREFIX}${materialId}_card`; }
function excludedKey(){ return `${EXCLUDED_PREFIX}${materialId}_card`; }
function saveProgress(){ try{ localStorage.setItem(progressKey(), JSON.stringify({index, excluded})); }catch(e){} }
function loadProgress(){ try{ const raw = localStorage.getItem(progressKey()); if(raw){ const p = JSON.parse(raw); index = Number(p.index||0); excluded = Array.isArray(p.excluded)?p.excluded:[]; } else { index = 0; excluded = JSON.parse(localStorage.getItem('excludedWords')||"[]"); } }catch(e){ index=0; excluded=[]; } }

/* データ読み込み（毎回 fetch） */
async function loadAndStart(){
  if(!materialUrl){ cardEl.textContent = "教材が指定されていません"; return; }
  try{
    const res = await fetch(materialUrl, { cache: "no-store" });
    if(!res.ok) throw new Error(res.status);
    const text = await res.text();
    original = parseCSV(text);
    // 整形：question/answer を推定
    const rows = original.map(row => {
      const keys = Object.keys(row);
      const qKey = keys.find(k=>/question|q/i.test(k)) || keys[0];
      const aKey = keys.find(k=>/answer|ans|答/i.test(k)) || keys[1] || keys[0];
      return { question: row[qKey]||"", answer: row[aKey]||"", raw: row };
    });
    // 除外読み込み・適用
    loadProgress();
    words = rows.filter(r => !excluded.includes(r.question));
    if(index >= words.length) index = Math.max(0, words.length-1);
    showingFront = true;
    updateCard();
  }catch(err){
    cardEl.textContent = "CSV の読み込みに失敗しました: " + err.message;
    progressEl.textContent = "";
  }
}

/* UI 更新 */
function updateCard(){
  if(!Array.isArray(words) || words.length===0){ cardEl.textContent = "問題がありません"; progressEl.textContent = ""; return; }
  if(index<0) index=0; if(index>=words.length) index=words.length-1;
  const item = words[index];
  cardEl.textContent = showingFront ? (item.question||"") : (item.answer||"");
  cardEl.classList.toggle('front', showingFront);
  cardEl.classList.toggle('back', !showingFront);
  progressEl.textContent = `${index+1} / ${words.length}`;
  saveProgress();
}

/* 操作 */
function flipCard(){ showingFront = !showingFront; updateCard(); }
function nextCard(){ if(!words.length) return; if(index < words.length-1){ index++; showingFront=true; updateCard(); } }
function prevCard(){ if(!words.length) return; if(index>0){ index--; showingFront=true; updateCard(); } }
btnLearned.addEventListener('click', ()=> {
  if(!words.length) return;
  const item = words[index];
  excluded.push(item.question);
  saveProgress();
  words.splice(index,1);
  if(index >= words.length) index = Math.max(0, words.length-1);
  showingFront = true;
  updateCard();
  localStorage.setItem('excludedWords', JSON.stringify(excluded)); // 互換
});

/* リセット */
document.getElementById('btn-reset').addEventListener('click', ()=> {
  if(!confirm('除外リストをリセットしますか？')) return;
  localStorage.removeItem(progressKey());
  localStorage.removeItem(excludedKey());
  localStorage.removeItem('excludedWords');
  excluded = [];
  loadAndStart();
  alert('除外リストをリセットしました');
});

/* 戻る（index に resumeIndex を付けて戻す） */
document.getElementById('btn-back').addEventListener('click', ()=> {
  const nextIdx = (Number.isFinite(startIndex) && startIndex >= 0) ? startIndex + 1 : null;
  if(nextIdx !== null) location.href = `index.html?resumeIndex=${nextIdx}`;
  else location.href = 'index.html';
});

/* 矢印 */
document.getElementById('prevBtn').addEventListener('click', prevCard);
document.getElementById('nextBtn').addEventListener('click', nextCard);

/* 初期化 */
document.addEventListener('DOMContentLoaded', ()=> { loadAndStart(); cardEl.addEventListener('click', flipCard); });
window.addEventListener('beforeunload', ()=> saveProgress());
</script>
</body>
</html>
