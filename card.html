<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>カードモード</title>
  <style>
    body {
      margin: 0;
      background: #ffffff;
      font-family: "Yu Gothic UI", sans-serif;
      overflow: hidden;
    }

    .screen {
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 20px;
      position: relative;
    }

    /* ★ あなたの希望に合わせたカードサイズ */
   .card {
  width: 95vw;
  max-width: 500px;
  margin: 0 auto;
  
  height: 40vh;
  background: #F5F5F0;
  border-radius: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.15);

  /* ★ 中央から広がるレイアウトのための設定 */
  display: flex;
  align-items: center;   /* 上下中央 */
  justify-content: center; /* 左右中央 */

  padding: 20px;
  overflow-y: auto;

  /* ★ 問題側の基本フォントサイズ（8pt → 10ptに微調整） */
  font-size: 10pt;
  line-height: 1.6;
  color: #222;

/* ★ 左右は左寄せに戻す（問題側のため） */
  text-align: left;
}


    .progress {
      font-size: 14pt;
      color: #444;
      margin-bottom: 10px;
    }

    .arrow-area {
      display: flex;
      width: 80%;
      justify-content: space-between;
      margin-top: 10px;
    }
    .arrow {
      font-size: 26pt;
      color: #666;
      user-select: none;
      cursor: pointer;
    }

    .learned-btn {
      font-size: 14pt;
      padding: 10px 20px;
      margin-bottom: 10px;
      border: none;
      border-radius: 6px;
      background: #d0e8d0;
      color: #333;
      cursor: pointer;
    }

    .back-button {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 20pt;
      color: #666;
      cursor: pointer;
    }

    /* ★ 除外リセットボタン */
    .reset-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 20pt;
      color: #666;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="screen">

    <!-- 戻るボタン -->
    <div class="back-button" onclick="location.href='mode-select.html'">×</div>

    <!-- 除外リセット -->
    <div class="reset-btn" onclick="resetExcluded()">↺</div>

    <!-- カード -->
    <div id="card" class="card" onclick="flipCard()"></div>

    <!-- 進捗表示（例：12/30） -->
    <div id="progress" class="progress"></div>

    <!-- 覚えたボタン（除外） -->
    <button id="btn-learned" class="learned-btn">覚えた</button>

    <!-- 進む・戻る -->
    <div class="arrow-area">
      <div class="arrow" onclick="prevCard()">←</div>
      <div class="arrow" onclick="nextCard()">→</div>
    </div>

  </div>

<script>
  /* index.html で読み込んだ CSV データを取得 */
  let words = JSON.parse(localStorage.getItem("data") || "[]");

  let index = 0;
  let showingFront = true;

  /* 除外リスト */
  let excluded = JSON.parse(localStorage.getItem("excludedWords") || "[]");

  const cardEl = document.getElementById("card");
  const progressEl = document.getElementById("progress");

  /* ★ カード更新 */
  function updateCard() {
    if (words.length === 0) {
      cardEl.textContent = "すべて覚えました！";
      progressEl.textContent = "";
      return;
    }

    const item = words[index];
    cardEl.textContent = showingFront ? item.question : item.answer;

   if (showingFront) {
  cardEl.style.textAlign = "left";   // 問題側：左寄せ
  cardEl.style.fontSize = "10pt";
} else {
  cardEl.style.textAlign = "center"; // 答え側：中央寄せ
  cardEl.style.fontSize = "12pt";    // +2pt
}

 /* ★ 12/30 のような表示 */
  progressEl.textContent = `${index + 1} / ${words.length}`;
}

  function flipCard() {
    showingFront = !showingFront;
    updateCard();
  }

  function nextCard() {
    if (index < words.length - 1) {
      index++;
      showingFront = true;
      updateCard();
    }
  }

  function prevCard() {
    if (index > 0) {
      index--;
      showingFront = true;
      updateCard();
    }
  }

  /* ★ 覚えた（除外） */
  document.getElementById("btn-learned").onclick = () => {
    const item = words[index];

    excluded.push(item.question);
    localStorage.setItem("excludedWords", JSON.stringify(excluded));

    words.splice(index, 1);

    if (index >= words.length) index = words.length - 1;
    showingFront = true;
    updateCard();
  };

  /* ★ 除外リセット（↺） */
  function resetExcluded() {
    if (!confirm("除外リストをリセットしますか？")) return;
    localStorage.removeItem("excludedWords");
    excluded = [];
    alert("除外リストをリセットしました");
  }

  document.addEventListener("DOMContentLoaded", () => {
    /* 除外済みを除いたリストを作成 */
    words = words.filter(item => !excluded.includes(item.question));
    updateCard();
  });
</script>

</body>
</html>
