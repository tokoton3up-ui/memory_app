<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>カードモード</title>
  <style>
    /* 全体レイアウト（スマホ中心） */
body {
  font-family: sans-serif;
  margin: 0;
  padding: 0;
  background: #f2f2f2;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* カード本体 */
.card {
  width: 90%;
  max-width: 500px;
  min-height: 40vh;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  padding: 20px;
  margin-top: 70px; /* 上の × やリセットと重ならないように */
  font-size: 1.2rem;
  line-height: 1.6;
  overflow-y: auto;
  position: relative;
}

/* 上部の × ボタン */
.close-btn {
  position: fixed;
  top: 15px;
  left: 15px;
  font-size: 2.2rem;
  font-weight: 700;
  cursor: pointer;
  user-select: none;
  z-index: 1000;
}

/* 上部のリセットボタン */
.reset-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  font-size: 2rem;
  font-weight: 700;
  cursor: pointer;
  user-select: none;
  z-index: 1000;
}

/* 矢印エリア（左右端に固定） */
.arrow-area {
  width: 100%;
  max-width: 500px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 15px;
}

/* 矢印（太く・大きく・押しやすく） */
.arrow {
  font-size: 2.6rem;
  font-weight: 800;
  padding: 10px 20px;
  cursor: pointer;
  user-select: none;
}

/* 覚えたボタン */
.ok-btn {
  width: 90%;
  max-width: 500px;
  background: #4CAF50;
  color: white;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  font-size: 1.4rem;
  margin-top: 20px;
  cursor: pointer;
  user-select: none;
}

/* カード番号（1/10） */
.counter {
  margin-top: 10px;
  font-size: 1rem;
  color: #555;
}

/* スマホ向け微調整 */
@media (max-width: 480px) {
  .card {
    font-size: 1.1rem;
    padding: 15px;
  }
  .arrow {
    font-size: 2.4rem;
  }
  .ok-btn {
    font-size: 1.2rem;
  }
}

  </style>
</head>

<body>

  <div class="screen">

    <!-- 戻るボタン -->
    <div class="back-button" onclick="location.href='mode-select.html'">×</div>

    <!-- 除外リセット -->
    <div class="reset-btn" onclick="resetExcluded()">↺</div>

    <!-- カード -->
    <div id="card" class="card" onclick="flipCard()"></div>

    <!-- 進捗表示（例：12/30） -->
    <div id="progress" class="progress"></div>

    <!-- 覚えたボタン（除外） -->
    <button id="btn-learned" class="learned-btn">覚えた</button>

    <!-- 進む・戻る -->
    <div class="arrow-area">
      <div class="arrow" onclick="prevCard()">←</div>
      <div class="arrow" onclick="nextCard()">→</div>
    </div>

  </div>

<script>
  /* index.html で読み込んだ CSV データを取得 */
  let words = JSON.parse(localStorage.getItem("data") || "[]");

  let index = 0;
  let showingFront = true;

  /* 除外リスト */
  let excluded = JSON.parse(localStorage.getItem("excludedWords") || "[]");

  const cardEl = document.getElementById("card");
  const progressEl = document.getElementById("progress");

  /* ★ カード更新 */
  function updateCard() {
    if (words.length === 0) {
      cardEl.textContent = "すべて覚えました！";
      progressEl.textContent = "";
      return;
    }

    const item = words[index];
    cardEl.textContent = showingFront ? item.question : item.answer;

   if (showingFront) {
  cardEl.style.textAlign = "left";   // 問題側：左寄せ
  cardEl.style.fontSize = "10pt";
} else {
  cardEl.style.textAlign = "center"; // 答え側：中央寄せ
  cardEl.style.fontSize = "12pt";    // +2pt
}

 /* ★ 12/30 のような表示 */
  progressEl.textContent = `${index + 1} / ${words.length}`;
}

  function flipCard() {
    showingFront = !showingFront;
    updateCard();
  }

  function nextCard() {
    if (index < words.length - 1) {
      index++;
      showingFront = true;
      updateCard();
    }
  }

  function prevCard() {
    if (index > 0) {
      index--;
      showingFront = true;
      updateCard();
    }
  }

  /* ★ 覚えた（除外） */
  document.getElementById("btn-learned").onclick = () => {
    const item = words[index];

    excluded.push(item.question);
    localStorage.setItem("excludedWords", JSON.stringify(excluded));

    words.splice(index, 1);

    if (index >= words.length) index = words.length - 1;
    showingFront = true;
    updateCard();
  };

  /* ★ 除外リセット（↺） */
  function resetExcluded() {
    if (!confirm("除外リストをリセットしますか？")) return;
    localStorage.removeItem("excludedWords");
    excluded = [];
    alert("除外リストをリセットしました");
  }

  document.addEventListener("DOMContentLoaded", () => {
    /* 除外済みを除いたリストを作成 */
    words = words.filter(item => !excluded.includes(item.question));
    updateCard();
  });
</script>

</body>
</html>
